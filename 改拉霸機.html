<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JS 幸運連線遊戲</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding-top: 50px; background-color: #f4f4f9; }
        .slot-container { display: flex; justify-content: center; gap: 20px; margin: 30px; }
        .slot-box { 
            width: 80px; height: 100px; line-height: 100px; 
            font-size: 3em; background: white; border: 3px solid #333; border-radius: 10px; 
        }
        .hint { color: blue; font-size: 1.5em; margin: 20px; font-weight: bold; }
        button { padding: 10px 30px; font-size: 1.2em; cursor: pointer; background-color: #ffcc00; border: none; border-radius: 5px; }
        button:hover { background-color: #ffaa00; }
    </style>
</head>
<body>

    <h1>🎰 幸運連線大賽 🎰</h1>
    <p>按下按鈕，看看你今天的運氣！</p>

    <div class="slot-container">
        <div id="num1" class="slot-box">?</div>
        <div id="num2" class="slot-box">?</div>
        <div id="num3" class="slot-box">?</div>
    </div>

    <button id="myBtn">開始轉動！</button>

    <div id="resultText" class="hint">準備好就開始吧！</div>
    <p>目前嘗試次數：<span id="countText">0</span></p>

    <script>
        // --- 單元 A：變數宣告 ---
        let attempts = 0; 

        // --- 單元 B：選取元素 ---
        const btn = document.getElementById('myBtn');
        const resultMsg = document.getElementById('resultText');
        const countMsg = document.getElementById('countText');
        const box1 = document.getElementById('num1');
        const box2 = document.getElementById('num2');
        const box3 = document.getElementById('num3');

        // --- 單元 C：事件監聽 ---
        btn.addEventListener('click', function() {
            
            // 1. 產生三個 1-5 之間的隨機數 (縮小範圍比較容易中獎)
            const n1 = Math.floor(Math.random() * 5) + 1;
            const n2 = Math.floor(Math.random() * 5) + 1;
            const n3 = Math.floor(Math.random() * 5) + 1;

            // 2. 更新畫面顯示
            box1.innerText = n1;
            box2.innerText = n2;
            box3.innerText = n3;

            // 3. 更新次數
            attempts++;
            countMsg.innerText = attempts;

            // --- 單元 D：中獎邏輯判斷 ---
            if (n1 === n2 && n2 === n3) {
                resultMsg.innerText = "🎊 恭喜中獎！三個數字都是 " + n1 + "！";
                resultMsg.style.color = "green";
                // 中獎後的特效：背景變色
                document.body.style.backgroundColor = "#e1ffed";
            } else {
                resultMsg.innerText = "很可惜，再試一次！";
                resultMsg.style.color = "red";
                document.body.style.backgroundColor = "#f4f4f9";
            }
        });
    </script>
</body>
</html>
